name: Documentation Pages

'on':
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - '.github/workflows/docs_pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Deploy to dotnetdiag.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: dotnetdiag/dotnetdiag.github.io
          publish_branch: main
          publish_dir: ./_site
